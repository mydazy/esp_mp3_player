version: 0.1.0
maintainers:
- mydazy <opensource@mydazy.com>
description: 'Streaming MP3 player for ESP32-S3: HTTP chunked download → MP3 decode
  → resample → PCM out, fully PSRAM-resident, with abortable lifecycle. Audio output
  and HTTP transport are injected via abstract interfaces, so the component is project-agnostic.'
license: Apache-2.0
tags:
- audio
- mp3
- streaming
- http
- decoder
- resampler
- psram
dependencies:
  idf: '>=5.3'
  espressif/esp_audio_codec: ~2.4.1
  espressif/esp_audio_effects: ~1.2.1
files:
  exclude:
  - test/**
  - examples/**/build/**
  - examples/**/managed_components/**
  - .github/**
url: https://github.com/mydazy/esp_mp3_player
repository: https://github.com/mydazy/esp_mp3_player.git
documentation: https://github.com/mydazy/esp_mp3_player#readme
issues: https://github.com/mydazy/esp_mp3_player/issues
